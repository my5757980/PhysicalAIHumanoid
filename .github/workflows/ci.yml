name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: TypeScript + Docusaurus build ─────────────────────────────────
  frontend:
    name: Frontend (TS + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Docusaurus build
        run: npm run build

  # ── Backend: Python lint + unit tests ───────────────────────────────────────
  backend:
    name: Backend (Python tests)
    runs-on: ubuntu-latest
    env:
      # Provide stub values so config imports don't fail during tests
      OPENAI_API_KEY: sk-test-placeholder
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: test-key
      QDRANT_COLLECTION: physical-ai-book
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests/ -v --tb=short
        working-directory: ${{ github.workspace }}
